name: Validation failure
description: Report a workflow pack that fails validation unexpectedly.
title: "[Validation]: "
labels: ["validation"]
body:
  - type: textarea
    id: command-output
    attributes:
      label: Validator command and output
      description: Paste the exact command and full output from validate_workflow_pack.py.
      render: text
    validations:
      required: true
  - type: textarea
    id: files
    attributes:
      label: Relevant pack files
      description: Share redacted snippets of source table, claims matrix, outline, or ppt-master input.
    validations:
      required: false
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed API keys, private URLs, and credentials from this issue.
          required: true
