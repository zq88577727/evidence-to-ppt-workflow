<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">Claims matrix example</title>
  <desc id="desc">A visual table showing claims mapped to evidence, status, deck wording, and caveats.</desc>
  <rect width="980" height="430" fill="#f8fafc"/>
  <text x="32" y="44" font-family="Arial" font-size="26" font-weight="700" fill="#0f172a">Claims Matrix Gate</text>
  <text x="32" y="72" font-family="Arial" font-size="15" fill="#475569">Every slide-worthy claim must point to accepted evidence before entering the deck.</text>
  <g transform="translate(32 105)" font-family="Arial">
    <rect width="916" height="48" fill="#1d4ed8" rx="10"/>
    <text x="22" y="31" font-size="15" fill="white" font-weight="700">Claim</text>
    <text x="315" y="31" font-size="15" fill="white" font-weight="700">Evidence</text>
    <text x="470" y="31" font-size="15" fill="white" font-weight="700">Status</text>
    <text x="610" y="31" font-size="15" fill="white" font-weight="700">Deck wording</text>
    <rect y="58" width="916" height="72" fill="white" stroke="#cbd5e1" rx="10"/>
    <text x="22" y="88" font-size="14" fill="#0f172a">Agents fit bounded, verifiable workflows first.</text>
    <text x="315" y="88" font-size="14" fill="#0f172a">S1, S3</text>
    <text x="470" y="88" font-size="14" fill="#166534" font-weight="700">accepted</text>
    <text x="610" y="88" font-size="14" fill="#0f172a">Start from repeatable workflows.</text>
    <rect y="140" width="916" height="72" fill="white" stroke="#cbd5e1" rx="10"/>
    <text x="22" y="170" font-size="14" fill="#0f172a">SMBs broadly deploy agents today.</text>
    <text x="315" y="170" font-size="14" fill="#0f172a">S2</text>
    <text x="470" y="170" font-size="14" fill="#92400e" font-weight="700">needs caveat</text>
    <text x="610" y="170" font-size="14" fill="#0f172a">Use as directional, not definitive.</text>
    <rect y="222" width="916" height="72" fill="white" stroke="#cbd5e1" rx="10"/>
    <text x="22" y="252" font-size="14" fill="#0f172a">Unsupported market-size number.</text>
    <text x="315" y="252" font-size="14" fill="#0f172a">none</text>
    <text x="470" y="252" font-size="14" fill="#991b1b" font-weight="700">rejected</text>
    <text x="610" y="252" font-size="14" fill="#0f172a">Do not enter PPT.</text>
  </g>
</svg>
